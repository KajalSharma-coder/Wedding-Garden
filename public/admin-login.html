<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>Admin Login | Royal Vivah Gardens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
  </head>
  <body class="admin-login-page">
    <main class="login-shell">
      <section class="login-card glass-panel">
        <a href="/" class="back-link"><i class="bi bi-arrow-left"></i> Website</a>
        <div class="brand-mark">RV</div>
        <p class="eyebrow">Royal Vivah Gardens</p>
        <h1>Admin Access</h1>
        <p class="login-subtitle">Wedding venue command centre</p>
        <form id="adminLoginForm" class="needs-validation" novalidate>
          <div class="form-floating luxury-field">
            <input type="email" class="form-control" id="adminEmail" placeholder="admin@royalvivah.com" autocomplete="username" required>
            <label for="adminEmail">Email</label>
            <div class="invalid-feedback">Enter a valid admin email.</div>
          </div>
          <div class="form-floating luxury-field password-wrap">
            <input type="password" class="form-control" id="adminPassword" placeholder="Password" autocomplete="current-password" minlength="6" required>
            <label for="adminPassword">Password</label>
            <button class="icon-btn password-toggle" type="button" aria-label="Show password"><i class="bi bi-eye"></i></button>
            <div class="invalid-feedback">Enter your admin password.</div>
          </div>
          <div class="d-flex align-items-center justify-content-between gap-3">
            <label class="form-check luxury-check">
              <input class="form-check-input" type="checkbox" id="rememberAdmin">
              <span class="form-check-label">Remember me</span>
            </label>
            <span class="tiny-gold">Protected area</span>
          </div>
          <div id="loginAlert" class="alert luxury-alert d-none" role="alert"></div>
          <button class="btn gold-btn w-100" type="submit">
            <i class="bi bi-shield-lock"></i>
            Login to Dashboard
          </button>
        </form>
      </section>
    </main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
